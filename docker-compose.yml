services:
  alires:
    image: ${ALIRES_IMAGE:-ghcr.io/tarocats/alires:latest}
    container_name: alires
    restart: unless-stopped
    stop_grace_period: 30s
    ports:
      - "${ALIRES_PORT:-8000}:8000"
    environment:
      ADMIN_USERNAME: ${ADMIN_USERNAME:-admin}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD:-change-me}
      TOKEN_SECRET: ${TOKEN_SECRET:-change-this-secret}
      DATABASE_URL: ${DATABASE_URL:-sqlite:////app/data/app.db}
      LEGACY_CONFIG_FILE: ${LEGACY_CONFIG_FILE:-/app/data/config.json}
      MOCK_ALIYUN: ${MOCK_ALIYUN:-0}
      CORS_ORIGIN: ${CORS_ORIGIN:-http://localhost:8000}
    volumes:
      - ./data:/app/data
    healthcheck:
      test:
        - CMD
        - python
        - -c
        - import sys,urllib.request; sys.exit(0 if urllib.request.urlopen("http://127.0.0.1:8000/api/health").status == 200 else 1)
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s

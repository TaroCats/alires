changelog:
  exclude:
    labels:
      - skip-changelog
      - no-changelog
  categories:
    - title: New Features
      labels:
        - feature
        - enhancement
    - title: Fixes
      labels:
        - fix
        - bug
        - bugfix
    - title: Documentation
      labels:
        - docs
    - title: Maintenance
      labels:
        - chore
        - ci
        - dependencies

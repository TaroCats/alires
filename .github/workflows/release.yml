name: Release

on:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch:
    inputs:
      version:
        description: "Release version tag, for example v1.0.0"
        required: false
        type: string
      publish_latest:
        description: "Also update the latest image tag"
        required: false
        default: false
        type: boolean

permissions:
  contents: read
  packages: write

env:
  REGISTRY: ghcr.io

jobs:
  prepare:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.vars.outputs.version }}
      image: ${{ steps.vars.outputs.image }}
      publish_latest: ${{ steps.vars.outputs.publish_latest }}
    steps:
      - name: Resolve release variables
        id: vars
        shell: bash
        run: |
          image="${REGISTRY}/${GITHUB_REPOSITORY,,}"
          if [[ "${GITHUB_REF_TYPE}" == "tag" ]]; then
            version="${GITHUB_REF_NAME}"
            publish_latest="true"
          else
            version="${{ inputs.version }}"
            if [[ -z "${version}" ]]; then
              version="manual-${GITHUB_SHA::7}"
            fi
            publish_latest="${{ inputs.publish_latest }}"
          fi
          echo "version=${version}" >> "${GITHUB_OUTPUT}"
          echo "image=${image}" >> "${GITHUB_OUTPUT}"
          echo "publish_latest=${publish_latest}" >> "${GITHUB_OUTPUT}"

  ci:
    runs-on: ubuntu-latest
    needs: prepare
    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install frontend dependencies
        run: npm ci

      - name: Build frontend
        run: npm run build

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install backend dependencies
        run: pip install -r requirements.txt

      - name: Verify backend imports
        run: python -m compileall api

  docker-build:
    runs-on: ubuntu-latest
    needs:
      - prepare
      - ci
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: linux/amd64
            suffix: x86
          - platform: linux/arm64
            suffix: arm64
          - platform: linux/arm/v7
            suffix: arm
    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Setup QEMU
        uses: docker/setup-qemu-action@v3

      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push platform image
        id: build
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          platforms: ${{ matrix.platform }}
          provenance: false
          sbom: false
          push: true
          tags: |
            ${{ needs.prepare.outputs.image }}:${{ needs.prepare.outputs.version }}-${{ matrix.suffix }}
            ${{ needs.prepare.outputs.image }}:sha-${{ github.sha }}-${{ matrix.suffix }}

      - name: Export image digest
        shell: bash
        run: |
          mkdir -p /tmp/digests
          digest="${{ steps.build.outputs.digest }}"
          touch "/tmp/digests/${digest#sha256:}"

      - name: Upload image digest
        uses: actions/upload-artifact@v4
        with:
          name: digests-${{ matrix.suffix }}
          path: /tmp/digests/*
          if-no-files-found: error
          retention-days: 1

  docker-manifest:
    runs-on: ubuntu-latest
    needs:
      - prepare
      - docker-build
    steps:
      - name: Download digests
        uses: actions/download-artifact@v4
        with:
          path: /tmp/digests
          pattern: digests-*
          merge-multiple: true

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Create multi-arch manifest
        shell: bash
        run: |
          image="${{ needs.prepare.outputs.image }}"
          version="${{ needs.prepare.outputs.version }}"

          tags="-t ${image}:${version}"
          if [[ "${{ needs.prepare.outputs.publish_latest }}" == "true" ]]; then
            tags="${tags} -t ${image}:latest"
          fi

          sources=()
          for digest_file in /tmp/digests/*; do
            digest="$(basename "${digest_file}")"
            sources+=("${image}@sha256:${digest}")
          done

          docker buildx imagetools create ${tags} "${sources[@]}"
          docker buildx imagetools inspect "${image}:${version}"

  macos-bundle:
    runs-on: macos-latest
    needs:
      - prepare
      - ci
    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install frontend dependencies
        run: npm ci

      - name: Build frontend
        run: npm run build

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install backend dependencies
        run: pip install -r requirements.txt

      - name: Build macOS deployment bundle
        shell: bash
        run: |
          bundle_dir="release-bundle"
          archive_name="alires-${{ needs.prepare.outputs.version }}-macos-bundle.tar.gz"
          mkdir -p "${bundle_dir}"
          cp -R api "${bundle_dir}/api"
          cp -R dist "${bundle_dir}/dist"
          cp README.md requirements.txt Dockerfile monitor.py report.py "${bundle_dir}/"
          tar -czf "${archive_name}" "${bundle_dir}"
          echo "ARCHIVE_NAME=${archive_name}" >> "${GITHUB_ENV}"

      - name: Upload macOS bundle
        uses: actions/upload-artifact@v4
        with:
          name: macos-bundle
          path: ${{ env.ARCHIVE_NAME }}
          if-no-files-found: error
          retention-days: 7

  github-release:
    if: github.ref_type == 'tag'
    runs-on: ubuntu-latest
    needs:
      - prepare
      - docker-manifest
      - macos-bundle
    permissions:
      contents: write
    steps:
      - name: Download macOS bundle
        uses: actions/download-artifact@v4
        with:
          name: macos-bundle
          path: ./release-assets

      - name: Publish GitHub release
        uses: softprops/action-gh-release@v2
        with:
          files: ./release-assets/*
          generate_release_notes: true
